<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --surface2: #221f3a;
    --border: rgba(255,255,255,0.08);
    --text: #fffffe;
    --text-muted: #a7a9be;
    --accent: #ff8906;
    --m1: #f25f4c;
    --m2: #3da9fc;
    --m3: #7bed9f;
    --m1-bg: rgba(242,95,76,0.15);
    --m2-bg: rgba(61,169,252,0.15);
    --m3-bg: rgba(123,237,159,0.15);
    --rad: 16px;
    --rad-sm: 10px;
  }
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .blobs { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; -webkit-filter: blur(100px); filter: blur(100px); opacity: 0.12; }
  .b1 { width: 500px; height: 500px; background: var(--m1); top: -120px; left: -120px; }
  .b2 { width: 400px; height: 400px; background: var(--m2); bottom: -100px; right: -100px; }
  .b3 { width: 300px; height: 300px; background: var(--m3); top: 35%; left: 38%; }

  .app { position: relative; z-index: 1; padding: 14px; max-width: 1400px; margin: 0 auto; }

  /* TOP BAR */
  .topbar {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
    gap: 10px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad);
    padding: 13px 20px; margin-bottom: 14px;
  }
  .tl { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 10px; }
  .tr { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 14px; }

  .app-title { font-family: 'Fraunces', serif; font-size: 1.45rem; font-weight: 700; }
  .app-title span { color: var(--accent); font-style: italic; }

  .pills { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 5px; }
  .pill {
    display: -webkit-inline-box; display: -webkit-inline-flex; display: inline-flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 999px; font-size: 0.74rem; font-weight: 700;
    cursor: pointer; border: 2px solid transparent; -webkit-user-select: none; user-select: none;
  }
  .pill.off { opacity: 0.3; }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  .wx {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rad-sm); padding: 8px 13px;
  }
  .wx-icon { font-size: 1.5rem; }
  .wx-temp { font-weight: 800; font-size: 0.95rem; line-height: 1; }
  .wx-desc { font-size: 0.66rem; color: var(--text-muted); font-weight: 600; }
  .wx-city { font-size: 0.63rem; color: var(--text-muted); }

  #clock { font-family: 'Fraunces', serif; font-size: 1.75rem; font-weight: 700; letter-spacing: -1px; line-height: 1; }
  #datestr { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-align: right; }

  /* BODY */
  .body {
    display: -webkit-box; display: -webkit-flex; display: flex;
    gap: 14px; -webkit-box-align: start; -webkit-align-items: flex-start; align-items: flex-start;
  }

  /* CALENDAR */
  .cal-panel {
    -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); padding: 18px;
  }
  .cal-nav {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
    margin-bottom: 14px;
  }
  .cal-month { font-family: 'Fraunces', serif; font-size: 1.45rem; font-weight: 700; }
  .cal-yr { color: var(--accent); }
  .nav-btns { display: -webkit-box; display: -webkit-flex; display: flex; gap: 5px; }
  .nav-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--rad-sm); width: 35px; height: 35px; cursor: pointer;
    font-size: 1rem; font-family: 'Nunito', sans-serif;
  }

  table.cal { width: 100%; border-collapse: separate; border-spacing: 3px; }
  table.cal th { text-align: center; font-size: 0.66rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding-bottom: 5px; }
  table.cal td {
    width: 14.28%; vertical-align: top;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rad-sm);
    padding: 6px 5px 4px; cursor: pointer; height: 72px;
  }
  table.cal td.other { opacity: 0.27; }
  table.cal td.today { border-color: var(--accent); }
  table.cal td.sel { border-color: rgba(255,255,255,0.35); background: #2e2b50; }

  .dn { font-size: 0.76rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  table.cal td.today .dn { color: var(--accent); font-weight: 900; }
  .de { font-size: 0.57rem; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .de1 { background: var(--m1-bg); color: var(--m1); border-left: 2px solid var(--m1); }
  .de2 { background: var(--m2-bg); color: var(--m2); border-left: 2px solid var(--m2); }
  .de3 { background: var(--m3-bg); color: var(--m3); border-left: 2px solid var(--m3); }
  .de0 { background: rgba(255,255,255,0.07); color: var(--text-muted); border-left: 2px solid var(--text-muted); }
  .dm { font-size: 0.53rem; color: var(--text-muted); font-weight: 700; }

  /* SIDEBAR */
  .sidebar { width: 310px; -webkit-flex-shrink: 0; flex-shrink: 0; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; gap: 12px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); padding: 16px; }
  .ptitle { font-family: 'Fraunces', serif; font-size: 0.92rem; font-weight: 700; margin-bottom: 11px; }

  .evscroll { max-height: 260px; overflow-y: auto; }
  .evc {
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: start; -webkit-align-items: flex-start; align-items: flex-start; gap: 7px;
    padding: 8px 9px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--rad-sm); margin-bottom: 6px;
  }
  .evbar { width: 3px; border-radius: 3px; -webkit-align-self: stretch; align-self: stretch; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .bar1 { background: var(--m1); } .bar2 { background: var(--m2); } .bar3 { background: var(--m3); } .bar0 { background: var(--text-muted); }
  .evi { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; }
  .evn { font-size: 0.78rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .evm { font-size: 0.64rem; color: var(--text-muted); font-weight: 600; margin-top: 2px; }
  .evb { font-size: 0.58rem; font-weight: 800; padding: 2px 6px; border-radius: 999px; -webkit-flex-shrink: 0; flex-shrink: 0; white-space: nowrap; }
  .b1c { background: var(--m1-bg); color: var(--m1); } .b2c { background: var(--m2-bg); color: var(--m2); } .b3c { background: var(--m3-bg); color: var(--m3); }
  .noev { font-size: 0.78rem; color: var(--text-muted); text-align: center; padding: 14px 0; }

  .clbl { font-size: 0.66rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; display: block; }
  .cgrp { margin-bottom: 11px; }
  .cinp {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--rad-sm); color: var(--text); padding: 7px 9px;
    font-family: 'Nunito', sans-serif; font-size: 0.76rem; font-weight: 600;
  }
  .cinp:focus { outline: none; border-color: var(--accent); }
  .cinp::-webkit-input-placeholder { color: var(--text-muted); }

  .mrow { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; gap: 6px; margin-bottom: 5px; }
  .cpin { width: 26px; height: 26px; border-radius: 50%; border: none; padding: 0; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .mnin {
    -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rad-sm);
    color: var(--text); padding: 5px 8px; font-family: 'Nunito', sans-serif; font-size: 0.76rem; font-weight: 700;
  }
  .mnin:focus { outline: none; border-color: var(--accent); }

  .idrow { display: -webkit-box; display: -webkit-flex; display: flex; gap: 4px; margin-bottom: 5px; }
  .idrow select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rad-sm); color: var(--text); padding: 4px 5px; font-size: 0.68rem; font-family: 'Nunito', sans-serif; }
  .rmbtn { background: var(--m1-bg); color: var(--m1); border: none; border-radius: var(--rad-sm); padding: 0 8px; cursor: pointer; font-size: 0.82rem; font-weight: 700; -webkit-flex-shrink: 0; flex-shrink: 0; }

  .div { height: 1px; background: var(--border); margin: 9px 0; }
  .btn { display: block; width: 100%; padding: 8px 13px; border-radius: var(--rad-sm); font-family: 'Nunito', sans-serif; font-size: 0.76rem; font-weight: 800; cursor: pointer; border: none; margin-top: 4px; text-align: center; }
  .btnp { background: var(--accent); color: #0f0e17; }
  .btns { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .stmsg { font-size: 0.68rem; font-weight: 700; padding: 5px 8px; border-radius: 6px; margin-top: 6px; display: none; }
  .stmsg.show { display: block; }
  .stmsg.ok { background: var(--m3-bg); color: var(--m3); }
  .stmsg.err { background: var(--m1-bg); color: var(--m1); }
  .stmsg.loading { background: var(--m2-bg); color: var(--m2); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 780px) {
    .body { -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; }
    .sidebar { width: 100%; }
  }
</style>
</head>
<body>
<div class="blobs">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>
<div class="app">

  <div class="topbar">
    <div class="tl">
      <div class="app-title">Family <span>Calendar</span></div>
      <div class="pills" id="pills"></div>
    </div>
    <div class="tr">
      <div class="wx">
        <div class="wx-icon" id="wxIcon">&#127780;&#65039;</div>
        <div>
          <div class="wx-temp" id="wxTemp">--&deg;F</div>
          <div class="wx-desc" id="wxDesc">Loading...</div>
          <div class="wx-city" id="wxCity">Locating...</div>
        </div>
      </div>
      <div>
        <div id="clock">--:--</div>
        <div id="datestr">Loading...</div>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="cal-panel">
      <div class="cal-nav">
        <div class="cal-month"><span id="mname">Month</span> <span class="cal-yr" id="ynum">2024</span></div>
        <div class="nav-btns">
          <button class="nav-btn" onclick="chMo(-1)">&#8249;</button>
          <button class="nav-btn" onclick="goToday()">Today</button>
          <button class="nav-btn" onclick="chMo(1)">&#8250;</button>
        </div>
      </div>
      <table class="cal">
        <thead><tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr></thead>
        <tbody id="calBody"></tbody>
      </table>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="ptitle">&#128197; Upcoming Events</div>
        <div class="evscroll" id="upList"><div class="noev">Configure settings below to get started.</div></div>
      </div>
      <div class="panel">
        <div class="ptitle">&#9881; Settings</div>
        <div class="cgrp">
          <span class="clbl">Google API Key</span>
          <input class="cinp" type="password" id="apiKey" placeholder="AIza..." />
        </div>
        <div class="cgrp">
          <span class="clbl">Family Members</span>
          <div id="memRows"></div>
        </div>
        <div class="div"></div>
        <span class="clbl">Google Calendar IDs</span>
        <div id="calRows"></div>
        <button class="btn btns" onclick="addCalRow()" style="margin-top:5px;">+ Add Calendar</button>
        <div class="div"></div>
        <button class="btn btnp" onclick="doSync()">&#128260; Save &amp; Sync</button>
        <div class="stmsg" id="stmsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var WDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var DEF_MEMBERS = [{name:'Member 1',color:'#f25f4c'},{name:'Member 2',color:'#3da9fc'},{name:'Member 3',color:'#7bed9f'}];

var S = {
  yr: new Date().getFullYear(),
  mo: new Date().getMonth(),
  events: [],
  members: tryParse('fc_members', DEF_MEMBERS),
  apiKey: localStorage.getItem('fc_apiKey') || '',
  calIds: tryParse('fc_calIds', []),
  filters: [0,1,2],
  selTd: null
};

function tryParse(key, def) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}

/* CLOCK */
function tick() {
  var n = new Date(), h = n.getHours(), m = n.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
  document.getElementById('datestr').textContent = WDAYS[n.getDay()] + ', ' + MONTHS[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();
}
setInterval(tick, 1000); tick();

/* WEATHER */
var WICO = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
var WDSC = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Heavy showers',82:'Storms',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};

function loadWx() {
  if (!navigator.geolocation) { document.getElementById('wxDesc').textContent = 'No location'; return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var cw = d.current_weather, code = cw.weathercode;
        document.getElementById('wxIcon').textContent = WICO[code] || '🌡️';
        document.getElementById('wxTemp').textContent = Math.round(cw.temperature) + '°F';
        document.getElementById('wxDesc').textContent = WDSC[code] || 'Weather';
        fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
          .then(function(r) { return r.json(); })
          .then(function(g) { document.getElementById('wxCity').textContent = (g.address && (g.address.city || g.address.town || g.address.village)) || ''; })
          .catch(function(){});
      }).catch(function() { document.getElementById('wxDesc').textContent = 'Unavailable'; });
  }, function() { document.getElementById('wxDesc').textContent = 'Location denied'; });
}
loadWx(); setInterval(loadWx, 900000);

/* HELPERS */
function hRgba(hex, a) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function evcls(mi) { return mi===0?'de1':mi===1?'de2':mi===2?'de3':'de0'; }
function barcls(mi) { return mi===0?'bar1':mi===1?'bar2':mi===2?'bar3':'bar0'; }
function badcls(mi) { return mi===0?'b1c':mi===1?'b2c':mi===2?'b3c':''; }
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

/* PILLS */
function renderPills() {
  var c = document.getElementById('pills'); c.innerHTML = '';
  for (var i = 0; i < S.members.length; i++) {
    var m = S.members[i];
    var p = document.createElement('div');
    var active = S.filters.indexOf(i) !== -1;
    p.className = 'pill' + (active ? '' : ' off');
    p.style.background = hRgba(m.color, 0.15);
    p.style.color = m.color;
    p.style.borderColor = active ? m.color : 'transparent';
    var dot = document.createElement('span'); dot.className = 'pill-dot'; dot.style.background = m.color;
    p.appendChild(dot);
    p.appendChild(document.createTextNode(m.name));
    p.onclick = (function(idx) {
      return function() {
        var fi = S.filters.indexOf(idx);
        if (fi !== -1) { if (S.filters.length > 1) S.filters.splice(fi, 1); }
        else { S.filters.push(idx); }
        renderPills(); renderCal(); renderUp();
      };
    })(i);
    c.appendChild(p);
  }
}

/* MEMBER ROWS */
function renderMemRows() {
  var c = document.getElementById('memRows'); c.innerHTML = '';
  for (var i = 0; i < S.members.length; i++) {
    var m = S.members[i];
    var row = document.createElement('div'); row.className = 'mrow';
    var ci = document.createElement('input'); ci.type = 'color'; ci.className = 'cpin'; ci.value = m.color;
    ci.onchange = (function(idx) { return function() { S.members[idx].color = this.value; renderPills(); renderCal(); renderUp(); }; })(i);
    var ni = document.createElement('input'); ni.type = 'text'; ni.className = 'mnin'; ni.value = m.name; ni.placeholder = 'Name';
    ni.oninput = (function(idx) { return function() { S.members[idx].name = this.value; renderPills(); renderCal(); renderUp(); }; })(i);
    row.appendChild(ci); row.appendChild(ni); c.appendChild(row);
  }
}

/* CAL ID ROWS */
function renderCalRows() {
  var c = document.getElementById('calRows'); c.innerHTML = '';
  if (S.calIds.length === 0) { addCalRow(); return; }
  for (var i = 0; i < S.calIds.length; i++) {
    var cal = S.calIds[i];
    var wrap = document.createElement('div'); wrap.style.marginBottom = '7px';
    var lrow = document.createElement('div'); lrow.style.display = 'flex'; lrow.style.alignItems = 'center'; lrow.style.gap = '5px'; lrow.style.marginBottom = '3px';
    var lbl = document.createElement('span'); lbl.className = 'clbl'; lbl.style.margin = '0'; lbl.textContent = 'Calendar ' + (i+1);
    var sel = document.createElement('select');
    for (var mi = 0; mi < S.members.length; mi++) {
      var opt = document.createElement('option'); opt.value = mi; opt.textContent = S.members[mi].name;
      if (cal.member === mi) opt.selected = true; sel.appendChild(opt);
    }
    var aopt = document.createElement('option'); aopt.value = '-1'; aopt.textContent = 'All';
    if (cal.member === -1) aopt.selected = true; sel.appendChild(aopt);
    sel.onchange = (function(idx) { return function() { S.calIds[idx].member = parseInt(this.value); }; })(i);
    lrow.appendChild(lbl); lrow.appendChild(sel);
    var irow = document.createElement('div'); irow.className = 'idrow';
    var inp = document.createElement('input'); inp.className = 'cinp'; inp.type = 'text'; inp.style.flex = '1'; inp.value = cal.id; inp.placeholder = 'email@group.calendar.google.com';
    inp.oninput = (function(idx) { return function() { S.calIds[idx].id = this.value; }; })(i);
    var rm = document.createElement('button'); rm.className = 'rmbtn'; rm.textContent = '\u2715';
    rm.onclick = (function(idx) { return function() { S.calIds.splice(idx, 1); renderCalRows(); }; })(i);
    irow.appendChild(inp); irow.appendChild(rm);
    wrap.appendChild(lrow); wrap.appendChild(irow); c.appendChild(wrap);
  }
}
function addCalRow() { S.calIds.push({id:'', member:0}); renderCalRows(); }

/* STATUS */
function showSt(msg, type) { var el = document.getElementById('stmsg'); el.textContent = msg; el.className = 'stmsg show ' + type; }

/* SYNC */
function doSync() {
  S.apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('fc_members', JSON.stringify(S.members));
  localStorage.setItem('fc_apiKey', S.apiKey);
  localStorage.setItem('fc_calIds', JSON.stringify(S.calIds));
  if (!S.apiKey) { showSt('Please enter your Google API key.', 'err'); return; }
  var active = []; for (var i = 0; i < S.calIds.length; i++) { if (S.calIds[i].id.trim()) active.push(S.calIds[i]); }
  if (!active.length) { showSt('Please add at least one Calendar ID.', 'err'); return; }
  showSt('Syncing...', 'loading');
  S.events = [];
  var now = new Date();
  var tMin = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
  var tMax = new Date(now.getFullYear(), now.getMonth()+3, 1).toISOString();
  var done = 0, errs = 0, total = active.length;

  function finish() {
    renderCal(); renderUp(); renderPills();
    if (errs > 0 && S.events.length === 0) showSt('Failed. Check your API key & Calendar IDs.', 'err');
    else if (errs > 0) showSt('Synced with ' + errs + ' error(s). ' + S.events.length + ' events.', 'err');
    else showSt('\u2713 Synced! ' + S.events.length + ' events loaded.', 'ok');
  }

  for (var j = 0; j < active.length; j++) {
    (function(cal) {
      var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(cal.id.trim()) + '/events?key=' + S.apiKey + '&timeMin=' + tMin + '&timeMax=' + tMax + '&singleEvents=true&orderBy=startTime&maxResults=250';
      fetch(url).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).then(function(data) {
        var items = data.items || [];
        for (var k = 0; k < items.length; k++) {
          var ev = items[k];
          S.events.push({ id: ev.id, title: ev.summary || '(No title)', start: ev.start.dateTime || ev.start.date, end: (ev.end && (ev.end.dateTime || ev.end.date)) || '', allDay: !ev.start.dateTime, member: cal.member });
        }
        done++; if (done + errs === total) finish();
      }).catch(function() { errs++; done++; if (done + errs === total + errs) finish(); });
    })(active[j]);
  }
}

/* EVENTS FOR DAY */
function evForDay(y, m, d) {
  var target = y + '-' + pad2(m+1) + '-' + pad2(d);
  var out = [];
  for (var i = 0; i < S.events.length; i++) {
    var ev = S.events[i];
    if (S.filters.indexOf(ev.member) === -1 && ev.member !== -1) continue;
    if ((ev.start || '').slice(0,10) === target) out.push(ev);
  }
  return out;
}

/* RENDER CALENDAR */
function renderCal() {
  document.getElementById('mname').textContent = MONTHS[S.mo];
  document.getElementById('ynum').textContent = S.yr;
  var tbody = document.getElementById('calBody'); tbody.innerHTML = '';
  var firstDay = new Date(S.yr, S.mo, 1).getDay();
  var dim = new Date(S.yr, S.mo+1, 0).getDate();
  var diPrev = new Date(S.yr, S.mo, 0).getDate();
  var td = new Date(), tdy = td.getFullYear(), tdm = td.getMonth(), tdd = td.getDate();
  var cells = [];
  for (var i = firstDay-1; i >= 0; i--) cells.push({d: diPrev-i, m: S.mo-1, y: S.yr, other: true});
  for (var d = 1; d <= dim; d++) cells.push({d: d, m: S.mo, y: S.yr, other: false});
  var rem = 42 - cells.length;
  for (var j = 1; j <= rem; j++) cells.push({d: j, m: S.mo+1, y: S.yr, other: true});

  for (var row = 0; row < 6; row++) {
    var tr = document.createElement('tr');
    for (var col = 0; col < 7; col++) {
      var cell = cells[row*7+col];
      var tdEl = document.createElement('td');
      var cls = cell.other ? 'other' : '';
      var isToday = !cell.other && cell.d === tdd && S.mo === tdm && S.yr === tdy;
      if (isToday) cls += (cls ? ' ' : '') + 'today';
      tdEl.className = cls;
      var evs = cell.other ? [] : evForDay(cell.y, cell.m, cell.d);
      var html = '<div class="dn">' + cell.d + '</div>';
      for (var ei = 0; ei < Math.min(evs.length, 2); ei++) html += '<div class="de ' + evcls(evs[ei].member) + '">' + evs[ei].title + '</div>';
      if (evs.length > 2) html += '<div class="dm">+' + (evs.length-2) + ' more</div>';
      tdEl.innerHTML = html;
      tdEl.onclick = (function(c, evArr) {
        return function() {
          if (c.other) return;
          if (S.selTd) { S.selTd.className = S.selTd.className.replace(/ sel/g,'').replace(/sel/g,'').trim(); }
          this.className = (this.className ? this.className + ' sel' : 'sel');
          S.selTd = this;
          showDay(c, evArr);
        };
      })(cell, evs);
      tr.appendChild(tdEl);
    }
    tbody.appendChild(tr);
  }
}

/* SHOW DAY EVENTS */
function showDay(cell, evs) {
  var list = document.getElementById('upList');
  var ds = MONTHS[cell.m] + ' ' + cell.d + ', ' + cell.y;
  if (!evs.length) { list.innerHTML = '<div class="noev">No events on ' + ds + '</div>'; return; }
  list.innerHTML = '<div style="font-size:0.64rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;">' + ds + '</div>';
  for (var i = 0; i < evs.length; i++) list.appendChild(buildCard(evs[i]));
}

/* UPCOMING */
function renderUp() {
  var list = document.getElementById('upList');
  var now = new Date(); now.setHours(0,0,0,0);
  var up = [];
  for (var i = 0; i < S.events.length; i++) {
    var ev = S.events[i];
    if (S.filters.indexOf(ev.member) === -1 && ev.member !== -1) continue;
    if (new Date(ev.start) >= now) up.push(ev);
  }
  up.sort(function(a,b){ return new Date(a.start)-new Date(b.start); });
  up = up.slice(0, 15);
  list.innerHTML = '';
  if (!up.length) { list.innerHTML = '<div class="noev">No upcoming events.</div>'; return; }
  for (var j = 0; j < up.length; j++) list.appendChild(buildCard(up[j]));
}

function buildCard(ev) {
  var card = document.createElement('div'); card.className = 'evc';
  var bar = document.createElement('div'); bar.className = 'evbar ' + barcls(ev.member);
  var info = document.createElement('div'); info.className = 'evi';
  var d = new Date(ev.start);
  var ds = ev.allDay
    ? d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})
    : d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) + ' \u00b7 ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  info.innerHTML = '<div class="evn">' + ev.title + '</div><div class="evm">' + ds + '</div>';
  card.appendChild(bar); card.appendChild(info);
  var mn = (ev.member >= 0 && ev.member < S.members.length) ? S.members[ev.member].name : '';
  if (mn) { var b = document.createElement('span'); b.className = 'evb ' + badcls(ev.member); b.textContent = mn; card.appendChild(b); }
  return card;
}

/* NAV */
function chMo(d) {
  S.mo += d;
  if (S.mo > 11) { S.mo = 0; S.yr++; }
  if (S.mo < 0) { S.mo = 11; S.yr--; }
  renderCal(); renderUp();
}
function goToday() { S.yr = new Date().getFullYear(); S.mo = new Date().getMonth(); renderCal(); renderUp(); }

/* INIT */
document.getElementById('apiKey').value = S.apiKey;
renderMemRows(); renderCalRows(); renderPills(); renderCal(); renderUp();
if (S.apiKey) { var hasId = false; for (var ii = 0; ii < S.calIds.length; ii++) { if (S.calIds[ii].id.trim()) { hasId = true; break; } } if (hasId) doSync(); }
</script>
